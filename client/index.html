<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Code Share</title>
    <link rel="stylesheet" href="css/app.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs/loader.min.js"></script>

    <script src="js/editor.js" defer></script>
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <div class="lobby" id="lobby">
      <div class="lobby-card">
        <h1>Live Code Share</h1>
        <div class="sub">Collaborate in real-time</div>
        <div class="room-actions">
          <button id="createRoomBtn">Create Room</button>
          <div class="join-box">
            <input type="text" id="roomIdInput" placeholder="Enter Room ID" />
            <button id="joinRoomBtn">Join Room</button>
          </div>
        </div>
      </div>
    </div>

    <div class="app hidden" id="app">
      <div class="topbar">
        <div class="brand">LiveCode</div>
        <div class="controls">
          <select id="languageSelect">
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="c">C</option>
          </select>
          <div class="room-label-container" id="roomLabel">
            Room: <span id="roomIdLabel"></span>
          </div>
          <div class="connection-status connecting" id="connectionStatus">
            <span class="status-dot"></span> Connecting...
          </div>
        </div>
      </div>
      <div id="editor"></div>
    </div>
  </body>
</html>
